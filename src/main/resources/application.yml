server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campusfit-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:campusfit}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 60000
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: ${APP_MAX_UPLOAD_FILE_SIZE:10MB}
      max-request-size: ${APP_MAX_UPLOAD_REQUEST_SIZE:12MB}

app:
  name: 青搭 Backend
  jwt:
    user-secret: ${USER_JWT_SECRET:CampusFitUserSecretChangeMe1234567890}
    user-expire-hours: ${USER_JWT_EXPIRE_HOURS:72}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://s3.oss-cn-hangzhou.aliyuncs.com}
    region: ${ALIYUN_OSS_REGION:cn-hangzhou}
    bucket: ${ALIYUN_OSS_BUCKET:campusfit}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    max-file-size-bytes: ${ALIYUN_OSS_MAX_FILE_SIZE_BYTES:10485760}
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp
